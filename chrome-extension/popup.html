<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cadence</title>
    <style>
      :root {
        --green: #1f9d55;
        --green-dark: #176b3a;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --err: #c53030;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 14px;
        width: 320px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        font-size: 14px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }
      .brand {
        font-weight: 700;
        color: var(--green);
        font-size: 16px;
      }
      .who {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: var(--muted);
      }
      input {
        width: 100%;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      input:focus { outline: 2px solid var(--green); outline-offset: -1px; }
      button.primary {
        width: 100%;
        padding: 9px;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 4px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      button.primary:hover { background: var(--green-dark); }
      button.link {
        background: none;
        border: none;
        color: var(--muted);
        text-decoration: underline;
        cursor: pointer;
        padding: 0;
        font-size: 12px;
      }
      .err {
        color: var(--err);
        font-size: 12px;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row > div { flex: 1; }
      .hidden { display: none; }
      .kv {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 12px;
      }
      .kv .k { color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <span class="brand">Cadence</span>
      <span class="who" id="who"></span>
    </header>

    <div id="errBox" class="err hidden"></div>

    <!-- Signed-out view -->
    <div id="viewSignIn">
      <label>Email</label>
      <input id="email" type="email" autocomplete="username" />
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button class="primary" id="signInBtn">Sign in</button>
    </div>

    <!-- Signed-in view -->
    <div id="viewSettings" class="hidden">
      <label>Tenant ID</label>
      <input id="tenantID" type="text" placeholder="e.g. 1234" />
      <label>Store ID</label>
      <input id="storeID" type="text" placeholder="e.g. store-abc" />
      <button class="primary" id="saveSettingsBtn">Save</button>
      <div class="kv" style="margin-top: 12px;">
        <span class="k">Project</span>
        <span id="projectLabel"></span>
      </div>
      <div style="text-align: center; margin-top: 10px;">
        <button class="link" id="signOutBtn">Sign out</button>
      </div>
    </div>
  </body>
  <script type="module" src="popup.js"></script>
</html>
